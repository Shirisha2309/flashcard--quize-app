<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Quiz App</title>
<style>
  body {font-family: Arial; background: #f5f5f5; padding: 20px;}
 .container {display: flex; gap: 20px; max-width: 900px; margin: auto;}
 .card-box,.add-box {background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px #ccc; flex: 1;}
  button {padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin: 5px;}
  #nextBtn {background: blue; color: white;}
  #saveBtn {background: blue; color: white;}
  #deleteBtn {background: red; color: white;}
  input, textarea {width: 95%; padding: 8px; margin: 5px 0;}
</style>
</head>
<body>
<h2>STUDY SMARTER</h2>
<h1>Flashcard Quiz App</h1>
<div class="container">
  <div class="card-box">
    <p id="counter">0/0</p>
    <h3 id="question">No cards yet</h3>
    <p id="answer"></p>
    <button id="showBtn">Show Answer</button>
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
    <br>
    <button id="editBtn">Edit Card</button>
    <button id="deleteBtn">Delete</button>
  </div>

  <div class="add-box">
    <h3>Add New Card</h3>
    <label>Question</label>
    <input id="questionInput" type="text">
    <label>Answer</label>
    <textarea id="answerInput" rows="4"></textarea>
    <button id="saveBtn">Save Card</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
